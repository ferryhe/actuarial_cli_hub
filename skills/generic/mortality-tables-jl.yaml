schema_version: actuarial-cli-tool-card.v1
id: actuarial.mortality.tables_jl
name: MortalityTables.jl
status: cataloged
priority: P2
runtime:
  kind: optional-cli
  availability: planned
  command:
  - actuary
  - mortality
  - table
  allowedCommandPrefix: actuary mortality table
io:
  inputSchema: registry/schemas/model-run-input.schema.json
  outputSchema: registry/schemas/model-run-result.schema.json
  artifacts:
  - mortality_result
  - diagnostics
agent:
  skillPath: skills/hermes/mortality/SKILL.md
  useCases:
  - Mortality table lookup experiments
  - Life-contingency teaching examples
  limitations:
  - Requires Julia runtime when executed
  - Core install must not require Julia
upstream:
  repo: https://github.com/JuliaActuary/MortalityTables.jl
  package: MortalityTables.jl
  language: julia
  license: MIT
  install: julia package installation via Pkg
